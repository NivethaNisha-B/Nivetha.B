<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Booking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<style>
body {
  background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5') no-repeat center center/cover;
  min-height: 100vh;
  color: #fff;
}
.navbar { background-color: rgba(0,0,0,0.85) !important; }
.container { padding-top: 40px; }
.booking-form, .bookings-list, .admin-table {
  background: rgba(0,0,0,0.75);
  padding: 25px;
  border-radius: 15px;
  margin-bottom: 30px;
}
.btn-custom { background: #ff9800; color: white; font-weight: bold; }
.btn-custom:hover { background: #e68900; }
.table thead { background: #ff9800; color: #000; }
.party-booking { background-color: #ff4444 !important; color: #fff; }
.input-group-text { background: #343a40; color: #fff; border: none; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="#">🍽 Sorgam Restaurant</a>
<button class="btn btn-sm btn-warning ms-auto" onclick="openAdminModal()">Admin Login</button>
</div>
</nav>

<div class="container">

<!-- User View -->
<div id="userView">
<div class="row justify-content-center">
<div class="col-md-6">
  <div class="booking-form">
    <h2 class="text-center mb-4">Reserve a Table</h2>
    <form id="bookingForm">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phone" pattern="[0-9]{10}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" class="form-control" id="date" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Time</label>
        <input type="time" class="form-control" id="time" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Guests</label>
        <input type="number" class="form-control" id="guests" min="1" max="20" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Room Type</label>
        <select class="form-select" id="roomType" required>
          <option value="AC">AC</option>
          <option value="Non-AC">Non-AC</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Space Type</label>
        <select class="form-select" id="spaceType" required>
          <option value="Business">Business</option>
          <option value="Party">Party</option>
        </select>
      </div>
      <button type="submit" class="btn btn-custom w-100">Book Now</button>
    </form>
  </div>

  <div class="bookings-list">
    <h3 class="text-center mb-3">📋 Your Bookings</h3>
    <ul class="list-group" id="bookingsList"></ul>
  </div>
</div>
</div>
</div>

<!-- Admin View -->
<div id="adminView" style="display:none;">
<div class="admin-table">
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>👨‍🍳 Admin - All Bookings</h3>
  <button class="btn btn-sm btn-danger" onclick="logoutAdmin()">Logout</button>
</div>

<!-- Filter Panel -->
<div class="row mb-3 g-2">
  <div class="col-md-3">
    <input type="date" id="filterDate" class="form-control" placeholder="Filter by Date" onchange="applyFilters()">
  </div>
  <div class="col-md-3">
    <select id="filterRoom" class="form-select" onchange="applyFilters()">
      <option value="">All Rooms</option>
      <option value="AC">AC</option>
      <option value="Non-AC">Non-AC</option>
    </select>
  </div>
  <div class="col-md-3">
    <select id="filterSpace" class="form-select" onchange="applyFilters()">
      <option value="">All Spaces</option>
      <option value="Business">Business</option>
      <option value="Party">Party</option>
    </select>
  </div>
  <div class="col-md-3">
    <button class="btn btn-warning w-100" onclick="resetFilters()">Reset Filters</button>
  </div>
</div>

<div class="table-responsive">
<table class="table table-bordered text-center">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Date</th>
      <th>Time</th>
      <th>Guests</th>
      <th>Room</th>
      <th>Space</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="adminTableBody"></tbody>
</table>
</div>
</div>
</div>

<!-- Admin Modal -->
<div class="modal fade" id="adminModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Admin Login</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <label for="adminPassword">Password</label>
        <div class="input-group mb-3">
          <input type="password" id="adminPassword" class="form-control" placeholder="Enter Admin Password">
          <span class="input-group-text" style="cursor:pointer;" id="togglePwBtn" onclick="toggleAdminPassword()">
            <i class="bi bi-eye-fill" id="eyeIcon"></i>
          </span>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-custom" onclick="checkAdminPassword()">Login</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const bookingForm = document.getElementById("bookingForm");
const bookingsList = document.getElementById("bookingsList");
const adminTableBody = document.getElementById("adminTableBody");
const ADMIN_PASSWORD = "admin123";

document.addEventListener("DOMContentLoaded", loadBookings);

bookingForm.addEventListener("submit", function(event){
  event.preventDefault();
  const booking = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    guests: document.getElementById("guests").value,
    roomType: document.getElementById("roomType").value,
    spaceType: document.getElementById("spaceType").value
  };
  saveBooking(booking);
  loadBookings();
  bookingForm.reset();
});

function saveBooking(booking){
  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
  bookings.push(booking);
  localStorage.setItem("bookings", JSON.stringify(bookings));
}

function loadBookings(){
  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
  bookingsList.innerHTML = "";
  adminTableBody.innerHTML = "";
  bookings.forEach(displayBooking);
}

function displayBooking(booking){
  const li = document.createElement("li");
  li.className = "list-group-item bg-dark text-white";
  li.innerHTML = `<strong>${booking.name}</strong> (${booking.phone}) <br>
                  Date: ${booking.date}, Time: ${booking.time}, Guests: ${booking.guests} <br>
                  Room: ${booking.roomType}, Space: ${booking.spaceType}`;
  bookingsList.appendChild(li);

  const tr = document.createElement("tr");
  if(booking.spaceType==="Party") tr.classList.add("party-booking");
  tr.innerHTML = `<td contenteditable="false">${booking.name}</td>
                  <td contenteditable="false">${booking.phone}</td>
                  <td contenteditable="false">${booking.date}</td>
                  <td contenteditable="false">${booking.time}</td>
                  <td contenteditable="false">${booking.guests}</td>
                  <td contenteditable="false">${booking.roomType}</td>
                  <td contenteditable="false">${booking.spaceType}</td>
                  <td>
                    <button class="btn btn-sm btn-primary me-1" onclick="editRow(this)">✏️ Edit</button>
                    <button class="btn btn-sm btn-success me-1" onclick="saveRow(this)" style="display:none;">💾 Save</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteBooking('${booking.phone}','${booking.date}','${booking.time}')">❌ Cancel</button>
                  </td>`;
  adminTableBody.appendChild(tr);
}

// Edit/Save functions
function editRow(btn){
  const tr = btn.closest("tr");
  tr.querySelectorAll("td:not(:last-child)").forEach(td => td.contentEditable = true);
  btn.style.display = "none";
  tr.querySelector("button.btn-success").style.display = "inline-block";
}

function saveRow(btn){
  const tr = btn.closest("tr");
  const tds = tr.querySelectorAll("td");

  const updatedBooking = {
    name: tds[0].innerText,
    phone: tds[1].innerText,
    date: tds[2].innerText,
    time: tds[3].innerText,
    guests: tds[4].innerText,
    roomType: tds[5].innerText,
    spaceType: tds[6].innerText
  };

  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
  bookings = bookings.map(b => {
    if(b.phone === updatedBooking.phone && b.date === updatedBooking.date && b.time === updatedBooking.time){
      return updatedBooking;
    }
    return b;
  });
  localStorage.setItem("bookings", JSON.stringify(bookings));

  tr.querySelectorAll("td:not(:last-child)").forEach(td => td.contentEditable = false);
  btn.style.display = "none";
  tr.querySelector("button.btn-primary").style.display = "inline-block";
  loadBookings();
}

// Delete booking
function deleteBooking(phone,date,time){
  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
  bookings = bookings.filter(b => !(b.phone===phone && b.date===date && b.time===time));
  localStorage.setItem("bookings", JSON.stringify(bookings));
  loadBookings();
}

// Admin login modal
function openAdminModal(){
  const modal = new bootstrap.Modal(document.getElementById('adminModal'));
  modal.show();
}

function checkAdminPassword() {
  const input = document.getElementById("adminPassword").value;
  if (input === ADMIN_PASSWORD) {
    showAdminView();
    const modal = bootstrap.Modal.getInstance(document.getElementById('adminModal'));
    modal.hide();
    document.getElementById("adminPassword").value = "";
  } else {
    alert("❌ Incorrect password!");
  }
}

// Toggle password visibility with professional icon
function toggleAdminPassword() {
  const pwField = document.getElementById("adminPassword");
  const eyeIcon = document.getElementById("eyeIcon");

  if (pwField.type === "password") {
    pwField.type = "text"; // Show password
    eyeIcon.classList.remove("bi-eye-fill");
    eyeIcon.classList.add("bi-eye-slash-fill");
  } else {
    pwField.type = "password"; // Hide password
    eyeIcon.classList.remove("bi-eye-slash-fill");
    eyeIcon.classList.add("bi-eye-fill");
  }
}

// Enter key login
document.getElementById("adminPassword").addEventListener("keyup", function(event){
  if(event.key === "Enter"){
    checkAdminPassword();
  }
});

// Show/hide views
function showAdminView(){
  document.getElementById("userView").style.display="none";
  document.getElementById("adminView").style.display="block";
}
function logoutAdmin(){
  document.getElementById("adminView").style.display="none";
  document.getElementById("userView").style.display="block";
}

// Filter functions
function applyFilters(){
  const dateFilter = document.getElementById("filterDate").value;
  const roomFilter = document.getElementById("filterRoom").value;
  const spaceFilter = document.getElementById("filterSpace").value;

  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
  bookings = bookings.filter(b => 
    (dateFilter === "" || b.date === dateFilter) &&
    (roomFilter === "" || b.roomType === roomFilter) &&
    (spaceFilter === "" || b.spaceType === spaceFilter)
  );

  adminTableBody.innerHTML = "";
  bookings.forEach(displayBooking);
}

function resetFilters(){
  document.getElementById("filterDate").value = "";
  document.getElementById("filterRoom").value = "";
  document.getElementById("filterSpace").value = "";
  loadBookings();
}
</script>
</body>
</html>
