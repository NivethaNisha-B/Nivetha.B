<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Itinerary Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sticky-top { z-index: 1050; }
    .card { z-index: 1; }
    .activity-badge { padding: 2px 6px; border-radius: 4px; color: #fff; font-size: 0.8rem; }
    .Activity { background-color: #0d6efd; }
    .Meal { background-color: #ffc107; color: #000; }
    .Transport { background-color: #198754; }
  </style>
</head>
<body>

<!-- Sticky Summary Bar -->
<div id="summaryBar" class="bg-light shadow-sm p-3 sticky-top">
  <div class="container d-flex justify-content-between align-items-center flex-wrap">
    <div>
      <strong>Trip:</strong> <span id="summaryTripName">Trip Itinerary</span>
    </div>
    <div>
      <strong>Total Budget:</strong> ₹<span id="summaryTotalBudget">0</span> |
      <strong>Members:</strong> <span id="summaryMembers">0</span> |
      <strong>Per Person:</strong> ₹<span id="summaryPerPerson">0</span>
    </div>
  </div>
</div>

<div class="container my-4">

  <!-- Trip & Budget Card -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">✈️ Trip Details & Budget</h5>
      <div class="row g-3">
        <div class="col-md-4">
          <label for="tripName" class="form-label">Trip Name</label>
          <input type="text" id="tripName" class="form-control" placeholder="e.g. Goa Vacation 2025" oninput="updateSummary()">
        </div>
        <div class="col-md-4">
          <label for="tripBudget" class="form-label">Total Budget (₹)</label>
          <input type="number" id="tripBudget" class="form-control" placeholder="Enter total trip budget" oninput="updateSummary()">
        </div>
        <div class="col-md-4">
          <label for="tripMembers" class="form-label">Number of Members</label>
          <input type="number" id="tripMembers" class="form-control" placeholder="Enter number of people" oninput="updateSummary()">
        </div>
      </div>
    </div>
  </div>

  <!-- Itinerary Section -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">🗓️ Itinerary</h5>
      <div id="itineraryContainer"></div>
      <button class="btn btn-success mt-3" onclick="addDay()">Add Day</button>
    </div>
  </div>

  <!-- PDF Export Button -->
  <div class="d-grid mb-5">
    <button class="btn btn-primary btn-lg" onclick="downloadPDF()">Export as PDF</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let itinerary = {};
const colors = { "Activity": "Activity", "Meal": "Meal", "Transport": "Transport" };

/* ======= Add Day ======= */
function addDay() {
  const day = `Day ${Object.keys(itinerary).length + 1}`;
  itinerary[day] = [];
  const container = document.getElementById("itineraryContainer");

  const dayCard = document.createElement("div");
  dayCard.className = "card mb-3 shadow-sm";
  dayCard.innerHTML = `
    <div class="card-body">
      <h6>${day}</h6>
      <div class="row g-2 mb-2">
        <div class="col-md-3"><input type="date" class="form-control activityDate"></div>
        <div class="col-md-2"><input type="time" class="form-control activityTime"></div>
        <div class="col-md-4"><input type="text" class="form-control activityName" placeholder="Activity"></div>
        <div class="col-md-3">
          <select class="form-select activityType">
            <option value="Activity">Activity</option>
            <option value="Meal">Meal</option>
            <option value="Transport">Transport</option>
          </select>
        </div>
      </div>
      <button class="btn btn-sm btn-success" onclick="saveActivity(this, '${day}')">Add Activity</button>
      <ul class="list-group mt-2 activityList"></ul>
    </div>
  `;
  container.appendChild(dayCard);
}

/* ======= Save Activity ======= */
function saveActivity(btn, day) {
  const card = btn.closest(".card-body");
  const date = card.querySelector(".activityDate").value;
  const time = card.querySelector(".activityTime").value;
  const activity = card.querySelector(".activityName").value;
  const type = card.querySelector(".activityType").value;

  if (!date || !time || !activity) { alert("Please fill all fields"); return; }

  itinerary[day].push({date, time, activity, activityType: type});
  const ul = card.querySelector(".activityList");
  const li = document.createElement("li");
  li.className = "list-group-item";
  li.innerHTML = `<span class="activity-badge ${type} me-2">${type}</span>${date} - ${time}: ${activity}`;
  ul.appendChild(li);

  card.querySelector(".activityDate").value = "";
  card.querySelector(".activityTime").value = "";
  card.querySelector(".activityName").value = "";
}

/* ======= Update Summary ======= */
function updateSummary() {
  const tripName = document.getElementById("tripName").value || "Trip Itinerary";
  const budget = parseFloat(document.getElementById("tripBudget").value) || 0;
  const members = parseInt(document.getElementById("tripMembers").value) || 0;
  const perPerson = members > 0 ? (budget / members).toFixed(2) : 0;

  document.getElementById("summaryTripName").innerText = tripName;
  document.getElementById("summaryTotalBudget").innerText = budget.toLocaleString();
  document.getElementById("summaryMembers").innerText = members;
  document.getElementById("summaryPerPerson").innerText = perPerson.toLocaleString();
}

/* ======= PDF Export ======= */
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const tripName = document.getElementById("tripName").value || "Trip Itinerary";
  const budget = parseFloat(document.getElementById("tripBudget").value);
  const members = parseInt(document.getElementById("tripMembers").value);

  doc.setFontSize(18);
  doc.text(`🌍 ${tripName}`, 20, 20);
  doc.setFontSize(12);

  if (budget && members && budget > 0 && members > 0) {
    const perPerson = (budget / members).toFixed(2);
    doc.text(`💰 Total Budget: ₹${budget.toLocaleString()}`, 20, 40);
    doc.text(`👥 Members: ${members}`, 20, 50);
    doc.text(`📊 Per Person Share: ₹${perPerson}`, 20, 60);
  }

  doc.line(20, 70, 190, 70);
  let y = 80;

  Object.keys(itinerary).forEach((day, idx) => {
    doc.setFontSize(14);
    doc.text(`${day}`, 20, y);
    y += 10;
    doc.setFontSize(12);

    itinerary[day].forEach((item, i) => {
      doc.text(`${i+1}. ${item.date} - ${item.time} — ${item.activity} (${item.activityType})`, 25, y);
      y += 10;
    });
    y += 5;
  });

  doc.save(`${tripName.replace(/\s/g,'_')}.pdf`);
}
</script>

</body>
</html>
