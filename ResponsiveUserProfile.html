<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram-Style Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #fafafa;
      font-family: 'Arial', sans-serif;
    }
    .profile-header {
      display: flex;
      align-items: center;
      padding: 20px;
      background: white;
      border-bottom: 1px solid #ddd;
    }
    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #e1306c;
      margin-right: 30px;
    }
    .profile-info h2 {
      font-size: 1.8rem;
      font-weight: bold;
    }
    .profile-stats {
      display: flex;
      gap: 20px;
      margin: 10px 0;
    }
    .story-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid #e1306c;
      margin: 10px;
      overflow: hidden;
    }
    .story-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .post-grid {
      column-count: 3;
      column-gap: 5px;
      margin-top: 20px;
    }
    .post-grid img {
      width: 100%;
      margin-bottom: 5px;
      border-radius: 5px;
      cursor: pointer;
    }
    .edit-btn {
      background: #0095f6;
      color: white;
      font-weight: 500;
      border: none;
      border-radius: 5px;
      padding: 6px 12px;
    }
    .edit-btn:hover {
      background: #0077cc;
    }
  </style>
</head>
<body>

  <!-- Profile Header -->
  <div class="profile-header">
    <img src="https://i.pravatar.cc/150?img=8" alt="profile" class="profile-img">
    <div class="profile-info">
      <div class="d-flex align-items-center gap-3">
        <h2>cool_user</h2>
        <button class="edit-btn">Edit Profile</button>
      </div>
      <div class="profile-stats">
        <span><strong>120</strong> posts</span>
        <span><strong>2.5k</strong> followers</span>
        <span><strong>300</strong> following</span>
      </div>
      <p><strong>John Doe</strong><br>Just a simple bio 🌍✨</p>
    </div>
  </div>

  <!-- Story Highlights -->
  <div class="d-flex justify-content-start p-3 bg-white">
    <div class="story-circle"><img src="https://i.pravatar.cc/100?img=11" alt="story"></div>
    <div class="story-circle"><img src="https://i.pravatar.cc/100?img=12" alt="story"></div>
    <div class="story-circle"><img src="https://i.pravatar.cc/100?img=13" alt="story"></div>
    <div class="story-circle"><img src="https://i.pravatar.cc/100?img=14" alt="story"></div>
  </div>

  <!-- Posts Grid -->
  <div class="container">
    <div class="post-grid">
      <img src="https://picsum.photos/id/1011/500/500" alt="post" data-caption="Nature vibes 🍃" onclick="openPost(this)">
      <img src="https://picsum.photos/id/1025/500/500" alt="post" data-caption="Chilling with my dog 🐶" onclick="openPost(this)">
      <img src="https://picsum.photos/id/1035/500/500" alt="post" data-caption="Beautiful sunset 🌅" onclick="openPost(this)">
      <img src="https://picsum.photos/id/1043/500/500" alt="post" data-caption="City life 🏙️" onclick="openPost(this)">
      <img src="https://picsum.photos/id/1060/500/500" alt="post" data-caption="Coffee time ☕" onclick="openPost(this)">
      <img src="https://picsum.photos/id/1074/500/500" alt="post" data-caption="Waves 🌊" onclick="openPost(this)">
    </div>
  </div>

  <!-- Post Modal -->
  <div class="modal fade" id="postModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="row g-0">
          <div class="col-md-7">
            <img id="modalImage" src="" class="w-100 h-100" style="object-fit:cover;" alt="post">
          </div>
          <div class="col-md-5 d-flex flex-column">
            <div class="p-3 border-bottom">
              <strong>cool_user</strong>
              <p id="modalCaption" class="mt-2 mb-0"></p>
            </div>
            <div class="p-3 flex-grow-1 overflow-auto">
              <p><strong>alex</strong> 🔥🔥</p>
              <p><strong>lisa</strong> Awesome shot ❤️</p>
            </div>
            <div class="p-3 border-top">
              <input type="text" class="form-control" placeholder="Add a comment...">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function openPost(img) {
      document.getElementById("modalImage").src = img.src;
      document.getElementById("modalCaption").innerText = img.getAttribute("data-caption");
      var modal = new bootstrap.Modal(document.getElementById('postModal'));
      modal.show();
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
